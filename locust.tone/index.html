<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Locust Reactive Scanlines</title>
    <style>
      /*wanted to get rid of any borders and haav the whole webpage BLACK*/
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /*hide any chance of scrollbars*/
        background: #000;
      }
      /* ts is is the element that will attach the three.js canvas into */
      #mount {
        width: 100vw;
        height: 100vh;
      }
      /*whole canavas behaves like block */
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="mount"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
